
name: Deploy Trener

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'bot-matrix/**'
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Agregar host conocido
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Desplegar Backend
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          scp -P "$PORT" -r backend/*.py ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/Trener/backend/
          ssh -p "$PORT" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "pm2 restart trener-backend"

      - name: Desplegar Bot
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          scp -P "$PORT" bot-matrix/bot.js ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/matrix-bot/
          ssh -p "$PORT" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "pm2 restart matrix-bot"

      - name: Verificar servicios
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -p "$PORT" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "pm2 status"
